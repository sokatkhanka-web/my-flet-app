name: Build Flet APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install flet

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # ہم وہ ورژن سیٹ کر رہے ہیں جو فلیٹ کو چاہیے
          flutter-version: '3.22.2' 
          channel: 'stable'

      - name: Build APK
        run: |
          # 'yes' کا اضافہ کیا گیا ہے تاکہ سوالوں کا خودکار جواب مل سکے
          yes | flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: build/apk/*.apk
