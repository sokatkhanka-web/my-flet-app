name: Build Flet APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Flet
        run: |
          pip install flet
      
      - name: Build APK
        run: |
          # یہ کمانڈ گیتھب کے سرور پر APK بنائے گی
          flet build apk --target MobIslahNafs.py
      
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: my-app-apk
          path: build/apk/*.apk
